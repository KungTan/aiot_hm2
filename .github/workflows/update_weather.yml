name: Auto Update Weather Data

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC (08:00 and 20:00 Taiwan Time)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for git-auto-commit-action to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Caches pip dependencies for faster runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch new weather data (Runs data_manager.py)
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: |
          python data_manager.py

      - name: Commit and push updated database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: Auto-update weather data from CWA API [skip ci]"
          file_pattern: "data.db weather_data.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
